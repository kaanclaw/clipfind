<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClipFind — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:#0a0a0f; color:#f0f0f5; min-height:100vh; }

.header {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 32px; border-bottom:1px solid rgba(255,255,255,0.08);
  background:rgba(255,255,255,0.02);
}
.logo { font-size:16px; font-weight:700; }
.logo span { color:#7c3aed; }

.main { max-width:900px; margin:0 auto; padding:40px 24px; }

/* Upload card */
.upload-card {
  background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1);
  border-radius:12px; padding:32px; margin-bottom:32px;
}
.card-title { font-size:14px; font-weight:700; text-transform:uppercase;
  letter-spacing:1.5px; color:rgba(255,255,255,0.4); margin-bottom:20px; }

.drop-zone {
  border:2px dashed rgba(255,255,255,0.15); border-radius:10px;
  padding:40px; text-align:center; cursor:pointer; transition:all 0.2s;
  margin-bottom:16px;
}
.drop-zone:hover { border-color:#7c3aed; background:rgba(124,58,237,0.05); }
.drop-zone p { font-size:14px; color:rgba(255,255,255,0.4); margin-top:8px; }

input[type=file] { display:none; }

.field { margin-bottom:12px; }
.field label { display:block; font-size:12px; color:rgba(255,255,255,0.5);
  text-transform:uppercase; letter-spacing:1px; margin-bottom:6px; }
.field input, .field textarea {
  width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
  border-radius:8px; padding:10px 14px; color:#f0f0f5; font-family:inherit; font-size:14px;
  outline:none;
}
.field input:focus, .field textarea:focus { border-color:#7c3aed; }
.field textarea { resize:vertical; min-height:70px; }

.btn {
  padding:12px 24px; border-radius:8px; font-size:14px; font-weight:600;
  cursor:pointer; border:none; font-family:inherit; transition:all 0.2s;
}
.btn-primary { background:linear-gradient(135deg,#7c3aed,#2563eb); color:#fff; }
.btn-primary:hover { filter:brightness(1.1); transform:translateY(-1px); }
.btn-primary:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

/* Video list */
.videos-card {
  background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1);
  border-radius:12px; overflow:hidden;
}
.video-item {
  display:flex; align-items:center; gap:16px;
  padding:16px 24px; border-bottom:1px solid rgba(255,255,255,0.06);
  cursor:pointer; transition:background 0.15s;
}
.video-item:last-child { border-bottom:none; }
.video-item:hover { background:rgba(255,255,255,0.04); }
.video-item.selected { background:rgba(124,58,237,0.1); border-left:3px solid #7c3aed; }

.vi-icon { font-size:24px; flex-shrink:0; }
.vi-info { flex:1; min-width:0; }
.vi-name { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.vi-desc { font-size:12px; color:rgba(255,255,255,0.4); margin-top:2px; }
.vi-status { font-size:11px; font-weight:600; padding:3px 10px; border-radius:20px; flex-shrink:0; }
.s-ready    { background:rgba(74,222,128,0.12); color:#4ade80; }
.s-indexing { background:rgba(251,191,36,0.12); color:#fbbf24; }
.s-error    { background:rgba(248,113,113,0.12); color:#f87171; }

.empty { padding:40px; text-align:center; color:rgba(255,255,255,0.3); font-size:14px; }

/* Search panel */
.search-card {
  background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1);
  border-radius:12px; padding:24px; margin-top:24px;
}
.search-row { display:flex; gap:10px; }
.search-row input {
  flex:1; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
  border-radius:8px; padding:12px 16px; color:#f0f0f5; font-family:inherit; font-size:14px;
  outline:none;
}
.search-row input:focus { border-color:#7c3aed; }

.result { margin-top:16px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:10px; overflow:hidden; }
.result-header { display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:1px solid rgba(255,255,255,0.06); }
.result-score { font-size:12px; font-weight:700; padding:2px 8px; border-radius:6px; background:rgba(74,222,128,0.1); color:#4ade80; }
.result-ts { font-size:13px; font-weight:600; flex:1; }
.result-dur { font-size:11px; color:rgba(255,255,255,0.4); }
.result video { width:100%; display:block; background:#000; }
.result-dl { padding:10px 16px; }
.result-dl a { font-size:12px; color:#7c3aed; text-decoration:none; font-weight:600; }

.msg { padding:12px 16px; background:rgba(124,58,237,0.1); border:1px solid rgba(124,58,237,0.2); border-radius:8px; font-size:13px; margin-top:12px; }
.msg.error { background:rgba(248,113,113,0.1); border-color:rgba(248,113,113,0.2); color:#f87171; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Clip<span>Find</span></div>
  <div style="font-size:12px;color:rgba(255,255,255,0.3)" id="header-info">Loading...</div>
</div>

<div class="main">

  <!-- Upload -->
  <div class="upload-card">
    <div class="card-title">Upload Video</div>
    <div class="drop-zone" onclick="document.getElementById('fileinput').click()" id="dropzone">
      <div style="font-size:32px">🎬</div>
      <div style="font-size:15px;font-weight:600;margin-top:8px" id="dropzone-label">Click to choose video</div>
      <p>MP4, MOV — any length</p>
    </div>
    <input type="file" id="fileinput" accept="video/*" onchange="onFileChosen(this)">

    <div class="field">
      <label>Description (helps search accuracy)</label>
      <textarea id="desc" placeholder="e.g. Dashcam footage from I-280 rear-end collision, January 2024"></textarea>
    </div>

    <button class="btn btn-primary" id="upload-btn" onclick="doUpload()" disabled>
      Choose a file first
    </button>
    <div id="upload-msg" style="display:none" class="msg"></div>
  </div>

  <!-- Your Videos -->
  <div class="videos-card">
    <div style="padding:16px 24px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,0.4)">Your Videos</span>
      <span id="video-count" style="font-size:12px;color:rgba(255,255,255,0.3)">Loading...</span>
    </div>
    <div id="video-list"><div class="empty">Loading your videos...</div></div>
  </div>

  <!-- Search (shows when video selected) -->
  <div class="search-card" id="search-card" style="display:none">
    <div class="card-title" id="search-title">Search</div>
    <div class="search-row">
      <input type="text" id="query" placeholder='Describe what you\'re looking for — e.g. "moment of impact"' onkeydown="if(event.key==='Enter')doSearch()">
      <button class="btn btn-primary" id="search-btn" onclick="doSearch()">Search</button>
    </div>
    <div id="search-results"></div>
  </div>

</div>

<script>
const TOKEN = 'demo1234567890abcdef1234567890ab';
let selectedVideo = null;
let selectedFile = null;

// Load videos on start
async function loadVideos() {
  try {
    const r = await fetch(`/api/videos/${TOKEN}`);
    const d = await r.json();
    document.getElementById('header-info').textContent = `${d.plan} · ${(d.credits_used||0).toFixed(1)}h used`;
    renderVideos(d.videos || []);
  } catch(e) {
    document.getElementById('video-list').innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  }
}

function renderVideos(videos) {
  allVideos = videos;
  document.getElementById('video-count').textContent = `${videos.length} video${videos.length!==1?'s':''}`;
  if (!videos.length) {
    document.getElementById('video-list').innerHTML = '<div class="empty">No videos yet — upload one above</div>';
    return;
  }
  document.getElementById('video-list').innerHTML = videos.map(v => {
    const sc = v.status==='ready' ? 's-ready' : v.status==='indexing' ? 's-indexing' : 's-error';
    const sl = v.status==='ready' ? '✓ Ready to search' : v.status==='indexing' ? '⏳ Indexing...' : '✗ Error';
    const sel = selectedVideo?.id === v.id ? ' selected' : '';
    return `<div class="video-item${sel}" onclick="selectVideo(${JSON.stringify(JSON.stringify(v))})">
      <div class="vi-icon">🎬</div>
      <div class="vi-info">
        <div class="vi-name">${esc(v.filename)}</div>
        <div class="vi-desc">${esc(v.description || 'No description')}</div>
      </div>
      <div class="vi-status ${sc}">${sl}</div>
    </div>`;
  }).join('');

  // Poll indexing videos
  videos.filter(v=>v.status==='indexing').forEach(v => {
    setTimeout(() => pollStatus(v.id), 8000);
  });
}

let allVideos = [];

function selectVideoByIdx(idx) {
  const v = allVideos[idx];
  if (!v) return;
  selectedVideo = v;

  // Highlight selection
  document.querySelectorAll('.video-item').forEach(el => el.classList.remove('selected'));
  const el = document.querySelector(`.video-item[data-idx="${idx}"]`);
  if (el) el.classList.add('selected');

  // Show search panel
  const card = document.getElementById('search-card');
  const btn = document.getElementById('search-btn');
  card.style.display = 'block';
  document.getElementById('search-title').textContent = `Searching: ${v.filename}`;
  document.getElementById('search-results').innerHTML = '';

  if (v.status !== 'ready') {
    btn.disabled = true;
    btn.textContent = v.status === 'indexing' ? '⏳ Still indexing...' : '✗ Not ready';
  } else {
    btn.disabled = false;
    btn.textContent = 'Search →';
  }
}

async function pollStatus(videoId) {
  try {
    const r = await fetch(`/api/status/${TOKEN}/${videoId}`);
    const d = await r.json();
    if (d.status === 'ready') {
      showMsg('upload-msg', `✅ "${d.filename}" is ready to search!`);
      loadVideos();
    } else if (d.status === 'indexing') {
      setTimeout(() => pollStatus(videoId), 8000);
    } else {
      loadVideos();
    }
  } catch(e) {}
}

function onFileChosen(input) {
  selectedFile = input.files[0];
  if (!selectedFile) return;
  document.getElementById('dropzone-label').textContent = `✓ ${selectedFile.name}`;
  document.getElementById('upload-btn').disabled = false;
  document.getElementById('upload-btn').textContent = 'Upload & Index →';
}

async function doUpload() {
  if (!selectedFile) return;
  const btn = document.getElementById('upload-btn');
  btn.disabled = true;
  btn.textContent = 'Uploading...';

  const fd = new FormData();
  fd.append('file', selectedFile);
  fd.append('token', TOKEN);
  fd.append('description', document.getElementById('desc').value);

  try {
    const r = await fetch('/api/upload', {method:'POST', body:fd});
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'Upload failed');
    
    showMsg('upload-msg', `✅ Uploaded! Indexing in background — this takes ~8 min/hour of footage.`);
    btn.textContent = 'Upload & Index →';
    btn.disabled = false;
    document.getElementById('desc').value = '';
    document.getElementById('dropzone-label').textContent = 'Click to choose video';
    selectedFile = null;
    
    loadVideos();
    setTimeout(() => pollStatus(d.video_id), 10000);
  } catch(e) {
    showMsg('upload-msg', e.message, true);
    btn.disabled = false;
    btn.textContent = 'Upload & Index →';
  }
}

async function doSearch() {
  if (!selectedVideo) return;
  const q = document.getElementById('query').value.trim();
  if (!q) return;
  
  const btn = document.getElementById('search-btn');
  btn.disabled = true;
  btn.textContent = 'Searching...';
  document.getElementById('search-results').innerHTML = '<div class="msg">🔍 Searching... this takes 5-15 seconds</div>';

  const fd = new FormData();
  fd.append('token', TOKEN);
  fd.append('video_id', selectedVideo.id);
  fd.append('query', q);
  fd.append('max_results', '4');

  try {
    const r = await fetch('/api/search', {method:'POST', body:fd});
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail);
    
    const el = document.getElementById('search-results');
    if (!d.results || !d.results.length) {
      el.innerHTML = '<div class="msg error">No confident matches found. Try a different description.</div>';
    } else {
      el.innerHTML = d.results.map(res => `
        <div class="result">
          <div class="result-header">
            <div class="result-score">${res.score.toFixed(2)}</div>
            <div class="result-ts">📍 ${res.start_sec}s – ${res.end_sec}s</div>
            <div class="result-dur">${res.duration_sec}s clip · Match #${res.rank}</div>
          </div>
          ${res.clip_url ? `<video controls preload="metadata" src="${res.clip_url}"></video>` : ''}
          ${res.clip_url ? `<div class="result-dl"><a href="${res.clip_url}" download>↓ Download clip</a></div>` : ''}
        </div>`).join('');
    }
  } catch(e) {
    document.getElementById('search-results').innerHTML = `<div class="msg error">${e.message}</div>`;
  }
  
  btn.disabled = false;
  btn.textContent = 'Search';
}

function showMsg(id, text, isError) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg' + (isError ? ' error' : '');
  el.style.display = 'block';
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

loadVideos();
</script>
</body>
</html>
